[book]
authors = ["Technology Services"]
language = "en"
src = "src"
title = "Cloud Platforms"

[output.html]
default-theme = "aggie"
preferred-dark-theme = "navy"
additional-css = ["./theme/css/tabbed-code-blocks.css", "./theme/css/aggie-custom.css"]
additional-js = ["./theme/js/tabbed-code-blocks.js", "./theme/js/mermaid.min.js", "./theme/js/mermaid-init.js"]
edit-url-template = "https://github.com/tamu-edu/it-cloud-docs/edit/main/{path}"

[output.html.print]
enable = false

[output.html.fold]
enable = true    # whether or not to enable section folding
level = 1         # the depth to start folding

[preprocessor]

[preprocessor.mermaid]
command = "mdbook-mermaid"
